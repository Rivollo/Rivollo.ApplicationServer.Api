name: CI/CD - Docker to Azure Container Apps (Development)

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: rivollodevacr.azurecr.io
  IMAGE_NAME: rivollo-dev-portal-api
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINERAPP_NAME: ${{ vars.CONTAINERAPP_NAME }}

permissions:
  id-token: write   # required for OIDC azure/login
  contents: read

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    environment:
      name: dev
    outputs:
      image_num: ${{ steps.meta.outputs.image_num }}
      image_tag: ${{ steps.meta.outputs.tag_num }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set image metadata
        id: meta
        run: |
          TAG_NUM="build-${GITHUB_RUN_NUMBER}"
          IMAGE_NUM="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${TAG_NUM}"
          IMAGE_LATEST="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:latest"
          echo "tag_num=${TAG_NUM}" >> "$GITHUB_OUTPUT"
          echo "image_num=${IMAGE_NUM}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"
          echo "Using tag: ${TAG_NUM}"

      - name: Build and push (numeric + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_num }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image_latest }}
          cache-to: type=inline

      - name: Print pushed image digest
        run: |
          echo "GIT_COMMIT=${GITHUB_SHA}"
          docker pull "${{ steps.meta.outputs.image_num }}"
          docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.image_num }}" || true

  deploy:
    name: Deploy to Azure Container Apps (Dev)
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: dev

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new image to Container App
        run: |
          az containerapp update \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --image "${{ needs.build.outputs.image_num }}"

      - name: Wait for revision to be healthy
        run: |
          set -euo pipefail
          MAX_ATTEMPTS=30   # 30 × 10s = 5 min
          REV=""
          RUNNING_STATE=""
          PROV_STATE=""
          for i in $(seq 1 $MAX_ATTEMPTS); do
            REV=$(az containerapp revision list \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "sort_by([], &properties.createdTime)[-1].name" \
              -o tsv)
            RUNNING_STATE=$(az containerapp revision show \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --revision "$REV" \
              --query "properties.runningState" -o tsv)
            PROV_STATE=$(az containerapp revision show \
              --name "$CONTAINERAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --revision "$REV" \
              --query "properties.provisioningState" -o tsv)
            echo "Revision $REV running=$RUNNING_STATE provisioning=$PROV_STATE (attempt $i/$MAX_ATTEMPTS)"
            case "$RUNNING_STATE" in
              Running|RunningAtMaxScale)
                echo "::notice::Revision $REV is healthy"
                exit 0
                ;;
              ScaledToZero)
                if [ "$PROV_STATE" = "Provisioned" ]; then
                  echo "::notice::Revision $REV provisioned (scaled to zero). Deploy succeeded."
                  exit 0
                fi
                ;;
              Failed|Degraded|ActivationFailed)
                echo "::error::Revision $REV reached terminal failure state ($RUNNING_STATE)"
                break
                ;;
            esac
            sleep 10
          done

          echo "::warning::Revision did not reach a healthy state — last seen running=$RUNNING_STATE provisioning=$PROV_STATE"

          echo "::group::Container logs"
          az containerapp logs show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --revision "$REV" \
            --tail 200 || true
          echo "::endgroup::"

          echo "::group::System logs"
          az containerapp logs show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --type system --tail 200 || true
          echo "::endgroup::"

          echo "::group::Revision details"
          az containerapp revision show \
            --name "$CONTAINERAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --revision "$REV" -o yaml || true
          echo "::endgroup::"

          exit 1
